<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>AI Travel Chat</h1>
    <p>Ask for a travel itinerary based on destination, days, and interests.</p>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-row">
      <textarea
        id="message"
        placeholder="Create a 3 days travel plan for Boston with museums and seafood."
      ></textarea>
      <button id="send-btn" type="button">Send</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
